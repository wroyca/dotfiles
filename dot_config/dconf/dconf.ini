[org/gnome/builder/editor]
auto-save=false
draw-spaces=['tab','trailing']

[org/gnome/desktop/peripherals/touchpad]
speed=0.5
tap-to-click=true
two-finger-scrolling-enabled=true

[org/gnome/desktop/sound]
allow-volume-above-100-percent=true

[org/gnome/shell/extensions/auto-move-windows]
application-list=['firefox.desktop:1', 'sublime_text.desktop:2', 'sublime_merge.desktop:3']

[org/gnome/shell/extensions/dash-to-dock]
intellihide=false
show-trash=false
show-mounts=false

[org/gnome/shell]
favorite-apps=['firefox.desktop', 'org.gnome.Nautilus.desktop', 'sublime_text.desktop', 'sublime_merge.desktop']

[org/gnome/TextEditor]
indent-style='space'
show-line-numbers=true
show-right-margin=true
highlight-current-line=true
spellcheck=false
tab-width=2
wrap-text=false

[org/gtk/gtk/settings/file-chooser]
sort-directories-first=true

[org/gtk/gtk4/settings/file-chooser]
sort-directories-first=true
