[org/gnome/mutter]
check-alive-timeout=15000
workspaces-only-on-primary=false

[org/gnome/desktop/input-sources]
xkb-options=['caps:none']

[org/gnome/desktop/interface]
enable-hot-corners=false
show-battery-percentage=true
font-name='Inter 11'
document-font-name='Inter 11'
monospace-font-name='MonoLisa 10'
gtk-theme='adw-gtk3'
icon-theme='MoreWaita'

[org/gnome/desktop/notifications]
show-in-lock-screen=false

[org/gnome/desktop/peripherals/touchpad]
speed=0.5
tap-to-click=true
two-finger-scrolling-enabled=true

[org/gnome/desktop/privacy]
remove-old-temp-files=true
remove-old-trash-files=true

[org/gnome/desktop/sound]
allow-volume-above-100-percent=true

[org/gnome/desktop/wm/keybindings]
show-desktop=['<Super>d']

[org/gnome/desktop/wm/preferences]
resize-with-right-button=true

[org/gnome/shell]
enabled-extensions=['panel-corners@aunetx', 'caffeine@patapon.info', 'gsconnect@andyholmes.github.io', 'hide-minimized@danigm.net', 'legacyschemeautoswitcher@joshimukul29.gmail.com']

