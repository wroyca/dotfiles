# Disable power saving (power scheme 1) for the iwlmvm driver.
#
# The reasoning here is to deliberately bias towards stability and latency.
# Specifically, by preventing the hardware from entering sleep states, we
# avoid the sleep/wake cycle overhead that typically manifests as short,
# unpredictable drops in throughput.
#
# Note that the obvious drawback is increased power consumption. We accept
# this trade-off since consistent network performance is our primary concern
# anyways, making the extra power spend worthwhile.
#
options iwlmvm power_scheme=1
