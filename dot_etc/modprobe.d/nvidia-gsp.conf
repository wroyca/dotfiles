# Disable the GSP (GPU System Processor) firmware execution path.
#
# The problem is that recent NVIDIA drivers try to offload power management,
# scheduling, and related control logic to a RISC-V coprocessor embedded in
# newer GPUs. While the idea is sound, the current GSP firmware ends up
# causing performance regressions and sporadic latency spikes under load.
#
# So here we disable GSP to force the legacy, fully host-managed driver
# path. Note that we sacrifice some theoretical benefits of firmware
# offloading by doing this. However, it restores predictable performance
# and saves us from dealing with hard-to-diagnose edge cases.
#
options nvidia NVreg_EnableGpuFirmware=0
