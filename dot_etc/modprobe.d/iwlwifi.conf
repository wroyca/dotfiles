# Disable power saving and set the transmission power level to maximum.
#
# We do this because the iwlwifi firmware's dynamic power management can
# be overly aggressive. It frequently puts the radio to sleep during even
# brief idle periods. While this is great for battery life on a laptop,
# the wake-up latency penalty is highly noticeable during interactive
# sessions (like SSH). So instead, we instruct the driver to prioritize
# responsiveness and raw throughput over power efficiency. 
#
options iwlwifi power_save=0
options iwlwifi power_level=1

# Re-enable AMPDU (Aggregated MAC Protocol Data Unit) support for 802.11n.
#
# The 11n_disable option is technically a bitmask. Bit 3 (value 8) acts
# as a flag to clear the "no-AMPDU" capability bit. In other words, by
# setting 11n_disable=8, we are effectively enabling AMPDU transmission.
# We want this because aggregating multiple MPDUs into a single frame
# amortizes the physical layer overhead across multiple packets, which
# is essential for achieving higher 802.11n throughput.
#
# Note that historically, some older access point and chipset combinations
# had notoriously buggy AMPDU implementations. This is often why it ends
# up disabled or blacklisted in certain environments. However, on any
# reasonably modern network equipment, leaving AMPDU disabled just
# unnecessarily caps our performance. Since this setup has proven stable
# in practice, we assume a sane AP and force aggregation on.
#
# https://news.ycombinator.com/item?id=14678055
#
options iwlwifi 11n_disable=8
