[General]
# Enable fast connectable mode (assuming the adapter actually supports it).
# The standard Bluetooth discovery suffers from noticeable latency when
# reconnecting frequently used peripherals.
# To address this, we instruct the adapter to advertise much more
# aggressively, allowing other devices to initiate a connection almost
# immediately rather than making the user wait. Note that this increased
# advertising will consume more power -- something that might be measurable
# on battery-powered systems. However, in practice, the immediate
# responsiveness is well worth the slight
# power trade-off.
#
FastConnectable=true
