[main]
# The idea is to be resilient against transient mirror or network issues. If a 
# single repository goes down or is unreachable, we shouldn't fail the entire 
# update operation. Instead, we instruct DNF to just skip it. Note that this 
# only applies to the initial repository metadata synchronization. If a package 
# we actually need is missing later during the dependency resolution phase, 
# that will still be treated as a hard error, as it should be. The partial 
# syncs will simply remain visible via logs and notification emitters.
#
skip_if_unavailable=True

# The problem with metalinks is that while they usually reflect geographical 
# proximity, they don't really know anything about real-world throughput or 
# transient routing bottlenecks. So instead of blindly trusting the provided 
# order, we prefer to actively probe for the fastest available mirror. Yes, 
# this introduces a bit of overhead during the initial metadata fetch, but in 
# practice, it is well worth it to avoid long-tail stalls.
#
fastestmirror=True

# We require a minimum sustained download rate of 1 MB/s. If the throughput 
# drops below this threshold for longer than the configured socket timeout, 
# we abort the transfer and let DNF try another mirror. This might seem 
# intentionally aggressive, but on systems with generally reliable connectivity, 
# failing fast like this is vastly preferable to sitting there for multiple 
# minutes while a broken mirror trickles bytes at modem speeds.
#
minrate=1M

# This is purely a throughput optimization. The idea is to max out the 
# concurrent package downloads to 20 (which is the maximum supported value). 
# Doing parallel fetches keeps the network pipeline saturated and significantly 
# cuts down on the wall-clock time required for an update. This becomes 
# particularly noticeable when we are downloading a large batch of relatively 
# small packages, where connection setup latency would otherwise dominate.
#
max_parallel_downloads=20
